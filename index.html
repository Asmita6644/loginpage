<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0f172a;
            --secondary-color: #1e293b;
            --accent-color: #06b6d4;
            --accent-light: #22d3ee;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --background-color: #0f172a;
            --card-background: #1e293b;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
        }


        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 18px;
            color: var(--accent-color);
        }

        
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-background {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: -1;
        }

        .auth-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-form {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 150ms ease-in-out;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(203, 213, 225, 0.5);
        }

        .form-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 250ms ease-in-out;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            cursor: pointer;
            border: none;
        }

        .form-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease-out;
        }

        .auth-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #86efac;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .auth-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 150ms ease-in-out;
        }

        .auth-link:hover {
            color: var(--accent-light);
        }

        
        .dashboard-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .dashboard-header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .dashboard-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .logout-button {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-light);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 250ms ease-in-out;
        }

        .logout-button:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .dashboard-main {
            flex: 1;
            padding: 40px 20px;
        }

        .dashboard-section {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 20px;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .add-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 250ms ease-in-out;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            white-space: nowrap;
            border: none;
        }

        .add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .add-form {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            animation: slideDown 0.3s ease-out;
        }

        .add-form .form-group {
            margin-bottom: 16px;
        }

        .add-form .form-group:last-of-type {
            margin-bottom: 20px;
        }

        .submit-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 250ms ease-in-out;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            border: none;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .loading,
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .data-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            padding: 20px;
            transition: all 250ms ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0;
            transition: opacity 250ms ease-in-out;
        }

        .data-card:hover {
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.1);
            transform: translateY(-4px);
        }

        .data-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            word-break: break-word;
        }

        .delete-button {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 16px;
            transition: all 150ms ease-in-out;
            opacity: 0.6;
            cursor: pointer;
        }

        .delete-button:hover {
            opacity: 1;
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .card-description {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-date {
            font-size: 12px;
            color: rgba(203, 213, 225, 0.6);
        }

    
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-light);
        }

        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .add-button {
                width: 100%;
                text-align: center;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            .auth-card {
                padding: 32px 24px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!
    <div id="loadingScreen" class="loading-screen" style="display: none;">
        Loading...
    </div>

    
    <div id="authPages" class="auth-container">
        
        <div id="loginPage" class="auth-container">
            <div class="auth-background">
                <div class="auth-grid"></div>
            </div>
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to your account</p>
                </div>
                <div id="loginError" class="auth-error hidden"></div>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail" class="form-label">Email Address</label>
                        <input id="loginEmail" type="email" placeholder="you@example.com" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input id="loginPassword" type="password" placeholder="••••••••" required class="form-input">
                    </div>
                    <button type="submit" class="form-button">Sign In</button>
                </form>
                <div class="auth-footer">
                    <p>Don't have an account? <a class="auth-link" onclick="showSignup()">Sign up</a></p>
                </div>
            </div>
        </div>

        
        <div id="signupPage" class="auth-container hidden">
            <div class="auth-background">
                <div class="auth-grid"></div>
            </div>
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Create Account</h1>
                    <p class="auth-subtitle">Join us today</p>
                </div>
                <div id="signupError" class="auth-error hidden"></div>
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="signupName" class="form-label">Full Name</label>
                        <input id="signupName" type="text" placeholder="John Doe" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail" class="form-label">Email Address</label>
                        <input id="signupEmail" type="email" placeholder="you@example.com" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword" class="form-label">Password</label>
                        <input id="signupPassword" type="password" placeholder="••••••••" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="signupConfirm" class="form-label">Confirm Password</label>
                        <input id="signupConfirm" type="password" placeholder="••••••••" required class="form-input">
                    </div>
                    <button type="submit" class="form-button">Create Account</button>
                </form>
                <div class="auth-footer">
                    <p>Already have an account? <a class="auth-link" onclick="showLogin()">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>


    <div id="dashboard" class="dashboard-container hidden">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>Dashboard</h1>
                <div class="header-right">
                    <span class="user-info">Welcome, <span id="userName"></span>!</span>
                    <button class="logout-button" onclick="logout()">Sign Out</button>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-section">
                <div class="section-header">
                    <h2>Your Data</h2>
                    <button class="add-button" onclick="toggleAddForm()">+ Add New</button>
                </div>

                <div id="dashboardError" class="error-message hidden"></div>

                <form id="addForm" class="add-form hidden" onsubmit="addData(event)">
                    <div class="form-group">
                        <label for="dataTitle" class="form-label">Title</label>
                        <input id="dataTitle" type="text" placeholder="Enter title" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="dataDescription" class="form-label">Description</label>
                        <textarea id="dataDescription" placeholder="Enter description (optional)" class="form-textarea" rows="3"></textarea>
                    </div>
                    <button type="submit" class="submit-button">Save Data</button>
                </form>

                <div id="dataContainer">
                    <div class="loading">Loading your data...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        
        const API_URL = 'http://localhost:5000/api';
        let currentUser = null;
        let authToken = null;

        
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('authToken');
            const savedUser = localStorage.getItem('currentUser');

            if (savedToken && savedUser) {
                authToken = savedToken;
                currentUser = JSON.parse(savedUser);
                showDashboard();
            } else {
                showLogin();
            }
        });

        
        function showLogin() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('signupPage').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authPages').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
        }

        function showSignup() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('signupPage').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authPages').classList.remove('hidden');
            document.getElementById('signupError').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('authPages').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userName').textContent = currentUser?.name || 'User';
            document.getElementById('addForm').classList.add('hidden');
            loadData();
        }

        function toggleAddForm() {
            document.getElementById('addForm').classList.toggle('hidden');
            if (!document.getElementById('addForm').classList.contains('hidden')) {
                document.getElementById('dataTitle').focus();
            }
        }

        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Login failed');
                }

                const data = await response.json();
                authToken = data.token;
                currentUser = data.user;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showDashboard();
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirm').value;

            if (password !== confirmPassword) {
                document.getElementById('signupError').textContent = 'Passwords do not match';
                document.getElementById('signupError').classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                document.getElementById('signupError').textContent = 'Password must be at least 6 characters';
                document.getElementById('signupError').classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Signup failed');
                }

                const data = await response.json();
                authToken = data.token;
                currentUser = data.user;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showDashboard();
            } catch (error) {
                document.getElementById('signupError').textContent = error.message;
                document.getElementById('signupError').classList.remove('hidden');
            }
        });

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            document.getElementById('loginForm').reset();
            document.getElementById('signupForm').reset();
            showLogin();
        }

        
        async function loadData() {
            try {
                document.getElementById('dataContainer').innerHTML = '<div class="loading">Loading your data...</div>';

                const response = await fetch(`${API_URL}/data`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load data');
                }

                const items = await response.json();
                displayData(items);
            } catch (error) {
                document.getElementById('dashboardError').textContent = error.message;
                document.getElementById('dashboardError').classList.remove('hidden');
            }
        }

        function displayData(items) {
            const container = document.getElementById('dataContainer');

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No data yet. Create your first entry!</p></div>';
                return;
            }

            let html = '<div class="data-grid">';
            items.forEach(item => {
                const date = new Date(item.createdAt).toLocaleDateString();
                html += `
                    <div class="data-card">
                        <div class="card-header">
                            <h3>${escapeHtml(item.title)}</h3>
                            <button class="delete-button" onclick="deleteData('${item.id}')" title="Delete">✕</button>
                        </div>
                        ${item.description ? `<p class="card-description">${escapeHtml(item.description)}</p>` : ''}
                        <p class="card-date">${date}</p>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function addData(e) {
            e.preventDefault();
            const title = document.getElementById('dataTitle').value;
            const description = document.getElementById('dataDescription').value;

            try {
                const response = await fetch(`${API_URL}/data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ title, description })
                });

                if (!response.ok) {
                    throw new Error('Failed to add data');
                }

                document.getElementById('dataTitle').value = '';
                document.getElementById('dataDescription').value = '';
                document.getElementById('addForm').classList.add('hidden');
                document.getElementById('dashboardError').classList.add('hidden');
                loadData();
            } catch (error) {
                document.getElementById('dashboardError').textContent = error.message;
                document.getElementById('dashboardError').classList.remove('hidden');
            }
        }

        async function deleteData(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            try {
                const response = await fetch(`${API_URL}/data/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to delete data');
                }

                loadData();
            } catch (error) {
                document.getElementById('dashboardError').textContent = error.message;
                document.getElementById('dashboardError').classList.remove('hidden');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
